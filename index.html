<script>
function search() {
    let input = document.getElementById("searchBox").value.toLowerCase();
    let results = document.getElementById("results");

    if (input.includes("beach")) {
        results.innerHTML = `
        <h2>Beaches</h2>
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" width="200">
        <img src="https://images.unsplash.com/photo-1473116763249-2faaef81ccda" width="200">
        <p>Goa Beach, Marina Beach</p>
        `;
    } 
    else if (input.includes("temple")) {
        results.innerHTML = `
        <h2>Temples</h2>
        <img src="https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3" width="200">
        <img src="https://images.unsplash.com/photo-1603297631958-6d7a77f0b5c5" width="200">
        <p>Tirupati Temple, Meenakshi Temple</p>
        `;
    } 
    else if (input.includes("country")) {
        results.innerHTML = `
        <h2>Countries</h2>
        <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da" width="200">
        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" width="200">
        <p>India, France</p>
        `;
    } 
    else {
        results.innerHTML = "<p>No results found</p>";
    }
}

function clearSearch() {
    document.getElementById("results").innerHTML = "";
}
</script>
