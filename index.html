<!DOCTYPE html>
<html>
<head>
    <title>Travel Recommendation</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        nav a {
            margin-right: 15px;
            font-weight: bold;
        }

        img {
            margin: 10px;
            border-radius: 10px;
        }

        button {
            margin-left: 5px;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="#">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <br>

    <!-- Search -->
    <input type="text" id="searchInput" placeholder="Search (beach, temple, country)">
    <button onclick="search()">Search</button>
    <button onclick="clearSearch()">Clear</button>

    <br><br>

    <!-- Result -->
    <div id="result"></div>

    <script>
        function search() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let result = document.getElementById("result");

            // BEACH
            if (input.includes("beach")) {
                result.innerHTML = `
                <h2>Beaches</h2>

                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" width="300">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" width="300">

                <p>Goa Beach, Marina Beach</p>
                `;
            }

            // TEMPLE
            else if (input.includes("temple")) {
                result.innerHTML = `
                <h2>Temples</h2>

                <img src="https://images.unsplash.com/photo-1561361058-c24cecae35ca" width="300">
                <img src="https://images.unsplash.com/photo-1582510003544-4d00b7f74220" width="300">

                <p>Tirupati Temple, Meenakshi Temple</p>
                `;
            }

            // COUNTRY
            else if (input.includes("country")) {
                result.innerHTML = `
                <h2>Countries</h2>

                <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da" width="300">
                <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" width="300">

                <p>India, France</p>
                `;
            }

            // DEFAULT
            else {
                result.innerHTML = "<p>No results found</p>";
            }
        }

        function clearSearch() {
            document.getElementById("searchInput").value = "";
            document.getElementById("result").innerHTML = "";
        }
    </script>

</body>
</html>
